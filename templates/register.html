{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block page_title %}Register Person{% endblock %}
{% block extra_head %}
<style>
.register-form{max-width:480px;background:#111827;border-radius:12px;padding:28px;border:1px solid #1f2937}
.form-group{margin-bottom:18px}
.form-group label{display:block;color:#9ca3af;font-size:0.85rem;margin-bottom:6px}
.form-group input{width:100%;background:#1f2937;border:1px solid #374151;color:#e0e0e0;padding:10px 14px;border-radius:8px;font-size:0.9rem;outline:none}
.form-group input:focus{border-color:#00d084}
.preview-box{width:100%;aspect-ratio:1;background:#1f2937;border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:10px;border:2px dashed #374151}
.preview-box img{width:100%;height:100%;object-fit:cover;border-radius:6px}
.btn-submit{width:100%;background:#00d084;color:#000;border:none;padding:12px;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px}
.btn-submit:hover{background:#00b871}
</style>
{% endblock %}
{% block content %}
<div class="register-form">
  <h2 style="color:#e0e0e0;margin-bottom:20px">&#x1F4F7; Register New Person</h2>
  <form method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="name" placeholder="e.g. John Doe" required>
    </div>
    <div class="form-group">
      <label>Photo</label>
      <input type="file" name="photo" accept="image/*" required onchange="previewImg(this)">
      <div class="preview-box" id="preview-box">
        <span style="color:#4b5563;font-size:0.8rem">Preview</span>
      </div>
    </div>
    <button class="btn-submit" type="submit">Register Person</button>
  </form>
</div>
<script>
function previewImg(input){
  if(input.files&&input.files[0]){
    const r=new FileReader();
    r.onload=e=>{
      const b=document.getElementById("preview-box");
      b.innerHTML='<img src="'+e.target.result+'">';
    };r.readAsDataURL(input.files[0]);
  }
}
</script>
{% endblock %}
